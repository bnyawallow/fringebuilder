services:
  fringebuilder:
    image: ghcr.io/bnyawallow/fringebuilder:latest
    container_name: fringebuilder
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_BASE_URL: https://fringebuilder.creativefringe.digital
      MPESA_ENVIRONMENT: sandbox
      MPESA_CONSUMER_KEY: ""
      MPESA_CONSUMER_SECRET: ""
      MPESA_PASSKEY: ""
      MPESA_SHORTCODE: ""
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fringebuilder.rule=Host(`fringebuilder.creativefringe.digital`)"
      - "traefik.http.routers.fringebuilder.entrypoints=websecure"
      - "traefik.http.routers.fringebuilder.tls=true"
      - "traefik.http.services.fringebuilder.loadbalancer.server.port=3000"
    restart: unless-stopped
    networks:
      - proxy

networks:
  proxy:
    external: true
